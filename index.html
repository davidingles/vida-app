<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Vida</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Modal de documentos -->
    <div class="modal-overlay" id="docModal">
        <div class="modal-doc">
            <div class="modal-doc-header">
                <h2><i class="fas fa-folder-open"></i> Mis Documentos</h2>
                <button class="modal-close" id="closeDocModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="doc-upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Haz clic o arrastra un archivo aquí</p>
            </div>
            <input type="file" id="fileInput" accept="*/*">
            
            <div class="doc-form">
                <select id="docCategory">
                    <option value="">Seleccionar categoría...</option>
                    <option value="casa">Casa</option>
                    <option value="vehiculo">Vehículos</option>
                    <option value="trabajo">Trabajo</option>
                    <option value="religion">Religión</option>
                    <option value="gimnasio">Gimnasio</option>
                    <option value="familia">Familia</option>
                    <option value="bancos">Bancos</option>
                    <option value="devs">Devs</option>
                </select>
                <button class="btn-upload" id="btnUpload" disabled>
                    <i class="fas fa-upload"></i> Subir documento
                </button>
            </div>
            
            <div class="doc-list">
                <h3><i class="fas fa-file-alt"></i> Archivos subidos</h3>
                <div id="docListContainer"></div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <header class="header">
            <h1><i class="fas fa-user-clock"></i> Control de Vida</h1>
            <p class="subtitle">Gestiona todos los aspectos de tu vida</p>
        </header>

        <main class="main-grid">
            <button class="life-card" data-category="casa">
                <div class="card-icon">
                    <i class="fas fa-home"></i>
                </div>
                <span class="card-title">Casa</span>
                <span class="card-desc">Hogar y familia</span>
                <div class="card-progress">
                    <div class="progress-bar" style="--width: 75%"></div>
                </div>
            </button>

            <button class="life-card" data-category="vehiculo">
                <div class="card-icon">
                    <i class="fas fa-car"></i>
                </div>
                <span class="card-title">Vehículos</span>
                <span class="card-desc">Coche y moto</span>
                <div class="card-progress">
                    <div class="progress-bar" style="--width: 60%"></div>
                </div>
            </button>

            <button class="life-card" data-category="trabajo">
                <div class="card-icon">
                    <i class="fas fa-briefcase"></i>
                </div>
                <span class="card-title">Trabajo</span>
                <span class="card-desc">Carrera profesional</span>
                <div class="card-progress">
                    <div class="progress-bar" style="--width: 85%"></div>
                </div>
            </button>

            <button class="life-card" data-category="religion">
                <div class="card-icon">
                    <i class="fas fa-pray"></i>
                </div>
                <span class="card-title">Religión</span>
                <span class="card-desc">Fe y espiritualidad</span>
                <div class="card-progress">
                    <div class="progress-bar" style="--width: 90%"></div>
                </div>
            </button>

            <button class="life-card" data-category="gimnasio">
                <div class="card-icon">
                    <i class="fas fa-dumbbell"></i>
                </div>
                <span class="card-title">Gimnasio</span>
                <span class="card-desc">Salud y fitness</span>
                <div class="card-progress">
                    <div class="progress-bar" style="--width: 45%"></div>
                </div>
            </button>

            <button class="life-card" data-category="familia">
                <div class="card-icon">
                    <i class="fas fa-users"></i>
                </div>
                <span class="card-title">Familia</span>
                <span class="card-desc">Familia y seres queridos</span>
                <div class="card-progress">
                    <div class="progress-bar" style="--width: 80%"></div>
                </div>
            </button>

            <button class="life-card" data-category="bancos">
                <div class="card-icon">
                    <i class="fas fa-university"></i>
                </div>
                <span class="card-title">Bancos</span>
                <span class="card-desc">Finanzas y cuentas</span>
                <div class="card-progress">
                    <div class="progress-bar" style="--width: 70%"></div>
                </div>
            </button>

            <button class="life-card" data-category="devs">
                <div class="card-icon">
                    <i class="fas fa-code"></i>
                </div>
                <span class="card-title">Devs</span>
                <span class="card-desc">Desarrollo y tecnología</span>
                <div class="card-progress">
                    <div class="progress-bar" style="--width: 65%"></div>
                </div>
            </button>
        </main>

        <section class="content-panel" id="contentPanel">
            <div class="panel-header">
                <div class="panel-icon" id="panelIcon">
                    <i class="fas fa-home"></i>
                </div>
                <h2 id="panelTitle">Casa</h2>
            </div>
            <div class="panel-actions">
                <button class="btn-save-info" id="docToggle" aria-label="Subir documentos">
                    <i class="fas fa-folder-plus"></i> Subir documentos
                </button>
            </div>
            <form id="addTaskForm" class="add-task-form">
                <input type="text" id="newTaskInput" placeholder="Nueva tarea..." required>
                <button type="submit"><i class="fas fa-plus"></i> Agregar</button>
            </form>
            <div class="panel-content" id="panelContent"></div>
        </section>

        <footer class="footer">
            <p>Mantén el balance en tu vida</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
